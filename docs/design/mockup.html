Home }}\" style=\"flex:1;min-height:52px;border-radius:14px;background:var(--surface);color:var(--text);border:1.5px solid var(--outline-strong);font:700 16px Pretendard;cursor:pointer;\">홈으로<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ goContinue }}\" style=\"flex:1;min-height:52px;border-radius:14px;background:var(--brand);color:#fff;border:none;font:700 16px Pretendard;cursor:pointer;\">다시 시도<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ================= BOTTOM TAB BAR ================= -->\n        <sc-if value=\"{{ showTabBar }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"flex:0 0 auto;display:flex;background:var(--surface);border-top:1px solid var(--outline);padding:8px 12px calc(10px + env(safe-area-inset-bottom,0));\">\n            <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n              <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ t.style }}\">\n                <span style=\"display:flex;\">{{ t.icon }}<\u002Fspan>\n                <span style=\"font-size:11px;font-family:Pretendard;\">{{ t.label }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1120, &quot;height&quot;: 940}}\">\nclass Component extends DCLogic {\n  state = {\n    theme: 'light',\n    themeChoice: 'system',\n    screen: 'home',   // home | quiz | reviewEmpty | result | settings | loading | error\n    navKey: 'home',\n    mode: 'normal',   // normal | random | review | exam\n    startPos: 0,\n    pos: 0,\n    answers: {},      // pos -> chosen index\n    graded: {},       // pos -> bool\n    perfect: false,\n    selectedIdx: 0,\n  };\n\n  SUBJECTS = [\n    { name: '소방관계법규', sub: '심화 객관식 15 + OX 10', total: 25, done: 7 },\n    { name: '소방학개론', sub: '객관식 20', total: 20, done: 0 },\n    { name: '행정법총론', sub: '객관식 18 + OX 4', total: 22, done: 12 },\n    { name: '소방전술', sub: '객관식 18', total: 18, done: 3 },\n  ];\n\n  QUESTIONS = [\n    {\n      type: 'mc', badge: '객관식 · 심화',\n      stem: '다음 <보기> 중 옳은 것은 모두 몇 개인가?',\n      passage: [\n        'ㄱ. (소방기본법) 소방용수시설 조사결과는 2년간 보관한다.',\n        'ㄴ. (위험물법) 이동탱크저장소는 정기점검 대상이지만 예방규정 작성 대상은 아니다.',\n        'ㄷ. (화재예방법) 소방안전관리 전담 대상은 특급·1급·2급 대상물이다.',\n        'ㄹ. (소방시설법) 화재안전기준 강화 시 소화기구·비상경보설비·자동화재탐지설비는 강화된 기준을 적용할 수 있다.',\n        'ㅁ. (화재조사법) 화재조사관은 3명 이상 배치해야 한다.',\n      ],\n      choices: ['① 1개', '② 2개', '③ 3개', '④ 4개'],\n      answer: 2,\n      explain: '옳은 것은 ㄱ·ㄴ·ㄹ (3개). ㄷ 거짓 — 전담 대상은 특급·1급만(2급 제외). ㅁ 거짓 — 화재조사관은 2명 이상.',\n    },\n    {\n      type: 'ox', badge: 'OX · 심화',\n      stem: '이동탱크저장소는 정기점검 대상이지만 예방규정 작성 대상은 아니다.',\n      choices: ['O', 'X'],\n      answer: 0,\n      explain: 'O. 이동탱크저장소는 정기점검 대상이나 예방규정 작성 대상은 아니다(구분).',\n    },\n  ];\n\n  REVIEWS = [\n    { no: '4', q: '다음 <보기> 중 옳은 것은 모두 몇 개인가?', mine: '② 2개', correct: '③ 3개', explain: '옳은 것은 ㄱ·ㄴ·ㄹ (3개). ㄷ·ㅁ 거짓.' },\n    { no: '7', q: '소방안전관리 전담 대상은 특급·1급·2급 대상물이다.', mine: 'O', correct: 'X', explain: '전담 대상은 특급·1급만. 2급은 제외된다.' },\n    { no: '11', q: '화재조사관은 3명 이상 배치해야 한다.', mine: 'O', correct: 'X', explain: '화재조사관은 2명 이상 배치한다.' },\n    { no: '13', q: '소방용수시설 조사결과 보관 기간은 1년이다.', mine: 'O', correct: 'X', explain: '조사결과는 2년간 보관한다.' },\n    { no: '18', q: '이동탱크저장소는 예방규정 작성 대상이다.', mine: 'O', correct: 'X', explain: '정기점검 대상이나 예방규정 작성 대상은 아니다.' },\n    { no: '21', q: '자동화재탐지설비는 강화된 기준의 적용 대상이 아니다.', mine: 'O', correct: 'X', explain: '소화기구·비상경보·자탐은 강화된 기준을 적용할 수 있다.' },\n    { no: '24', q: '위험물 제조소의 안전거리는 어떤 경우에도 완화할 수 없다.', mine: 'O', correct: 'X', explain: '일정 요건 충족 시 안전거리를 완화할 수 있다.' },\n  ];\n\n  DEMO_COUNT = 2;\n\n  // ---- navigation ----\n  go(screen, key, extra) { this.setState({ screen, navKey: key, ...(extra || {}) }); }\n  goHome = () => this.go('home', 'home');\n  goSettings = () => this.go('settings', 'settings');\n  goSubjects = () => this.go('subjects', 'subjects');\n  selectSubject(i) { this.setState({ selectedIdx: i, screen: 'home', navKey: 'home' }); }\n  goContinue = () => {\n    const subj = this.SUBJECTS[this.state.selectedIdx] || this.SUBJECTS[0];\n    this.startQuiz('normal', Math.min(subj.done, 23), 'home');\n  };\n\n  startQuiz(mode, startPos, key) {\n    this.setState({ screen: mode === 'exam' ? 'quiz' : 'quiz', mode, startPos, pos: startPos, answers: {}, graded: {}, navKey: key || (mode === 'exam' ? 'exam' : 'quiz') });\n  }\n\n  choose(i) {\n    const { pos, mode, graded } = this.state;\n    if (mode !== 'exam' && graded[pos]) return; // locked after grading\n    const answers = { ...this.state.answers, [pos]: i };\n    if (mode === 'exam') { this.setState({ answers }); }\n    else { this.setState({ answers, graded: { ...graded, [pos]: true } }); }\n  }\n\n  next = () => {\n    const { startPos, pos } = this.state;\n    const last = startPos + this.DEMO_COUNT - 1;\n    if (pos >= last) { this.setState({ screen: 'result', navKey: 'result', perfect: false }); return; }\n    this.setState({ pos: pos + 1 });\n  };\n\n  setTheme(t) { this.setState({ theme: t, themeChoice: t }); }\n  setLight = () => this.setState({ theme: 'light' });\n  setDark = () => this.setState({ theme: 'dark' });\n\n  // ---- monoline icons ----\n  icon(name, size) {\n    const E = React.createElement;\n    const s = { width: size || 22, height: size || 22, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round' };\n    const p = d => E('path', { d, key: d });\n    switch (name) {\n      case 'home': return E('svg', s, p('M3 10.5 12 3l9 7.5'), p('M5.5 9.5V20h13V9.5'));\n      case 'layers': return E('svg', s, p('M12 3 21 8l-9 5-9-5 9-5Z'), p('M3.5 13 12 18l8.5-5'));\n      case 'sliders': return E('svg', s, p('M4 8h16'), p('M4 16h16'), E('circle', { cx: 15, cy: 8, r: 2.4, fill: 'var(--surface)', key: 'a' }), E('circle', { cx: 9, cy: 16, r: 2.4, fill: 'var(--surface)', key: 'b' }));\n      case 'play': return E('svg', { ...s, fill: 'currentColor', stroke: 'none' }, p('M8 5.4 18 12 8 18.6Z'));\n      case 'list': return E('svg', s, p('M4 7h16'), p('M4 12h16'), p('M4 17h11'));\n      case 'random': return E('svg', s, E('rect', { x: 4, y: 4, width: 16, height: 16, rx: 3, key: 'r' }), E('circle', { cx: 9, cy: 9, r: 1.3, fill: 'currentColor', stroke: 'none', key: 'a' }), E('circle', { cx: 15, cy: 15, r: 1.3, fill: 'currentColor', stroke: 'none', key: 'b' }));\n      case 'refresh': return E('svg', s, p('M20 12a8 8 0 1 1-2.3-5.6'), p('M20 4.5v4h-4'));\n      case 'timer': return E('svg', s, E('circle', { cx: 12, cy: 13.5, r: 7.5, key: 'c' }), p('M12 13.5V9.5'), p('M9.5 2.5h5'));\n      default: return null;\n    }\n  }\n\n  // ---- style helpers ----\n  tileColors(v) {\n    switch (v) {\n      case 'sel': return { bg: 'var(--sel-tint)', bd: 'var(--sel)', fg: 'var(--text)', op: '1' };\n      case 'correct': return { bg: 'var(--correct-tint)', bd: 'var(--correct)', fg: 'var(--correct-ink)', op: '1' };\n      case 'wrong': return { bg: 'var(--wrong-tint)', bd: 'var(--wrong)', fg: 'var(--wrong-ink)', op: '1' };\n      case 'dimmed': return { bg: 'var(--surface)', bd: 'var(--outline)', fg: 'var(--text-3)', op: '.5' };\n      default: return { bg: 'var(--surface)', bd: 'var(--outline)', fg: 'var(--text)', op: '1' };\n    }\n  }\n\n  chipStyle(active) {\n    return `padding:8px 14px;border-radius:999px;font:600 13px Pretendard;cursor:pointer;transition:all .2s;border:1px solid ${active ? 'var(--brand)' : 'var(--outline)'};background:${active ? 'var(--brand)' : 'var(--surface)'};color:${active ? '#fff' : 'var(--text-2)'};`;\n  }\n  segStyle(active) {\n    return `padding:7px 18px;border-radius:999px;border:none;cursor:pointer;font:600 13px Pretendard;transition:all .2s;background:${active ? 'var(--brand)' : 'transparent'};color:${active ? '#fff' : 'var(--text-2)'};`;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const darkOverride = s.theme === 'dark'\n      ? '--wk:#0C0D0F;--bg:#131417;--surface:#1B1D20;--surface-alt:#232529;--outline:#2E3136;--outline-strong:#3C4046;--text:#E9EAEC;--text-2:#9DA2AA;--text-3:#6E727A;--brand:#E86B4E;--brand-ink:#F08770;--brand-tint:#3A241D;--correct:#4FC189;--correct-ink:#74D3A3;--correct-tint:#1C3226;--wrong:#E86A82;--wrong-ink:#F08D9F;--wrong-tint:#37222A;--sel:#E9EAEC;--sel-tint:#26282C;--shadow:0 1px 2px rgba(0,0,0,.4);'\n      : '';\n\n    const isPlaying = s.screen === 'quiz';\n    const isExam = s.mode === 'exam';\n\n    const subj = this.SUBJECTS[s.selectedIdx] || this.SUBJECTS[0];\n    const subjectCards = this.SUBJECTS.map((x, i) => ({\n      name: x.name, sub: x.sub, total: x.total,\n      selected: i === s.selectedIdx,\n      pct: `${Math.round((x.done / x.total) * 100)}%`,\n      progressLabel: x.done > 0 ? `${x.done} / ${x.total} 진행 중` : '아직 시작하지 않음',\n      onClick: () => this.selectSubject(i),\n      cardStyle: `text-align:left;background:var(--surface);border:1.5px solid ${i === s.selectedIdx ? 'var(--brand)' : 'var(--outline)'};border-radius:14px;padding:16px 18px;cursor:pointer;box-shadow:var(--shadow);`,\n    }));\n    const showTabBar = ['home', 'subjects', 'settings'].includes(s.screen);\n    const tabs = [\n      { key: 'home', label: '홈', icon: this.icon('home', 22), onClick: this.goHome },\n      { key: 'subjects', label: '과목', icon: this.icon('layers', 22), onClick: this.goSubjects },\n      { key: 'settings', label: '설정', icon: this.icon('sliders', 22), onClick: this.goSettings },\n    ].map(t => {\n      const active = s.screen === t.key;\n      return { ...t, style: `flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;padding:6px 0;min-height:48px;color:${active ? 'var(--brand)' : 'var(--text-3)'};font-weight:${active ? '700' : '500'};` };\n    });\n\n    // current question\n    const q = this.QUESTIONS[(s.pos - s.startPos) % this.QUESTIONS.length] || this.QUESTIONS[0];\n    const graded = !!s.graded[s.pos];\n    const chosen = s.answers[s.pos];\n    const clickable = isExam || !graded;\n\n    const choices = (q.choices || []).map((label, i) => {\n      let v = 'idle';\n      let showCheck = false, showCross = false, showDot = false;\n      if (isExam) {\n        if (chosen === i) { v = 'sel'; showDot = true; }\n      } else if (graded) {\n        if (i === q.answer) { v = 'correct'; showCheck = true; }\n        else if (i === chosen) { v = 'wrong'; showCross = true; }\n        else { v = 'dimmed'; }\n      }\n      const c = this.tileColors(v);\n      const cur = (isExam || !graded) ? 'pointer' : 'default';\n      return {\n        label, showCheck, showCross, showDot,\n        onClick: () => this.choose(i),\n        mcStyle: `display:flex;align-items:center;gap:12px;width:100%;min-height:56px;padding:14px 16px;border-radius:14px;background:${c.bg};border:1.5px solid ${c.bd};color:${c.fg};opacity:${c.op};font:600 16px Pretendard;text-align:left;cursor:${cur};transition:background .2s,border-color .2s,opacity .2s;`,\n        oxStyle: `display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;flex:1;min-height:132px;border-radius:20px;background:${c.bg};border:2px solid ${c.bd};color:${c.fg};opacity:${c.op};cursor:${cur};transition:background .2s,border-color .2s,opacity .2s;`,\n      };\n    });\n\n    // explanation\n    const answered = chosen !== undefined;\n    const isCorrect = answered && chosen === q.answer;\n    const showExplain = isPlaying && !isExam && graded;\n    const bannerBg = isCorrect ? 'var(--correct-tint)' : 'var(--wrong-tint)';\n    const bannerBd = isCorrect ? 'var(--correct)' : 'var(--wrong)';\n    const bannerFg = isCorrect ? 'var(--correct-ink)' : 'var(--wrong-ink)';\n\n    // progress / button\n    const last = s.startPos + this.DEMO_COUNT - 1;\n    const isLast = s.pos >= last;\n    const total = 25;\n    const posLabel = `${s.pos + 1} / ${total}`;\n    const progressPct = `${Math.round(((s.pos + 1) / total) * 100)}%`;\n    const modeLabel = { normal: '정규', random: '랜덤', review: '오답 재풀이', exam: '시험 모드' }[s.mode] || '정규';\n    let nextLabel = '다음';\n    if (isLast) nextLabel = isExam ? '제출하고 채점' : '결과 보기';\n    const nextDisabled = !isExam && !graded;\n    const nextBtnStyle = `width:100%;min-height:52px;border-radius:14px;border:none;font:700 16px Pretendard;transition:opacity .2s;cursor:${nextDisabled ? 'not-allowed' : 'pointer'};background:var(--brand);color:#fff;opacity:${nextDisabled ? '.4' : '1'};`;\n\n    // result\n    const perfect = s.perfect;\n    const scoreNum = perfect ? '25' : '18';\n    const scorePct = perfect ? '100%' : '72%';\n    const scoreBarColor = perfect ? 'var(--correct)' : 'var(--brand)';\n    const scoreTag = perfect ? '만점 · 완벽' : '수고했어요';\n    const scoreTagIcon = perfect ? '✓' : '↗';\n    const scoreTagBg = perfect ? 'var(--correct-tint)' : 'var(--sel-tint)';\n    const scoreTagFg = perfect ? 'var(--correct-ink)' : 'var(--text-2)';\n\n    // nav chips\n    const navItems = [\n      { label: '홈', key: 'home', onClick: this.goHome },\n      { label: '과목', key: 'subjects', onClick: this.goSubjects },\n      { label: '풀이', key: 'quiz', onClick: () => this.startQuiz('normal', 0, 'quiz') },\n      { label: '시험', key: 'exam', onClick: () => this.startQuiz('exam', 0, 'exam') },\n      { label: '결과', key: 'result', onClick: () => this.go('result', 'result', { perfect: false }) },\n      { label: '설정', key: 'settings', onClick: this.goSettings },\n    ].map(n => ({ ...n, style: this.chipStyle(s.navKey === n.key) }));\n\n    const stateItems = [\n      { label: '오답 빈 상태', key: 'reviewEmpty', onClick: () => this.go('reviewEmpty', 'reviewEmpty') },\n      { label: '결과 만점', key: 'perfect', onClick: () => this.go('result', 'perfect', { perfect: true }) },\n      { label: '로딩', key: 'loading', onClick: () => this.go('loading', 'loading') },\n      { label: '에러', key: 'error', onClick: () => this.go('error', 'error') },\n    ].map(n => ({ ...n, style: this.chipStyle(s.navKey === n.key) }));\n\n    const modes = [\n      { icon: this.icon('list', 24), title: '전체 풀이', desc: '1번부터 순서대로', onClick: () => this.startQuiz('normal', 0, 'quiz') },\n      { icon: this.icon('random', 24), title: '랜덤', desc: '무작위 순서로', onClick: () => this.startQuiz('random', 0, 'quiz') },\n      { icon: this.icon('refresh', 24), title: '오답 재풀이', desc: '틀린 문항만 반복', onClick: () => this.go('reviewEmpty', 'reviewEmpty') },\n      { icon: this.icon('timer', 24), title: '시험 모드', desc: '25문 일괄 채점', onClick: () => this.startQuiz('exam', 0, 'exam') },\n    ];\n\n    const radioOn = 'width:22px;height:22px;border-radius:999px;border:7px solid var(--brand);box-sizing:border-box;';\n    const radioOff = 'width:22px;height:22px;border-radius:999px;border:2px solid var(--outline-strong);box-sizing:border-box;';\n    const themeOpts = [\n      { label: '시스템 설정 따름', key: 'system', onClick: () => this.setState({ themeChoice: 'system' }) },\n      { label: '라이트', key: 'light', onClick: () => this.setTheme('light') },\n      { label: '다크', key: 'dark', onClick: () => this.setTheme('dark') },\n    ].map(t => ({ ...t, radio: s.themeChoice === t.key ? radioOn : radioOff }));\n\n    return {\n      themeOverride: darkOverride,\n      lightBtnStyle: this.segStyle(s.theme === 'light'),\n      darkBtnStyle: this.segStyle(s.theme === 'dark'),\n      setLight: this.setLight, setDark: this.setDark,\n      navItems, stateItems, modes, themeOpts,\n      goHome: this.goHome, goSettings: this.goSettings, goContinue: this.goContinue,\n\n      isHome: s.screen === 'home',\n      isSubjects: s.screen === 'subjects',\n      showTabBar, tabs, subjectCards, goSubjects: this.goSubjects,\n      subjName: subj.name,\n      subjMeta: `${subj.sub} · 총 ${subj.total}문항`,\n      continueShow: subj.done > 0,\n      continueLabel: `정규 · ${subj.done}/${subj.total} 이어서 풀기`,\n      isPlaying,\n      isReviewEmpty: s.screen === 'reviewEmpty',\n      isResult: s.screen === 'result',\n      isSettings: s.screen === 'settings',\n      isLoading: s.screen === 'loading',\n      isError: s.screen === 'error',\n\n      playScreenLabel: isExam ? '시험' : '풀이',\n      badge: q.badge, stem: q.stem,\n      hasPassage: !!(q.passage && q.passage.length), passage: q.passage || [],\n      isMC: q.type === 'mc', isOX: q.type === 'ox',\n      choices,\n      showExplain, explainBody: q.explain,\n      bannerBg, bannerBd, bannerFg,\n      bannerIcon: isCorrect ? '✓' : '✕',\n      bannerTitle: isCorrect ? '정답입니다' : '오답입니다',\n      modeLabel, posLabel, progressPct,\n      nextLabel, nextBtnStyle, onNext: nextDisabled ? (() => {}) : this.next,\n\n      isPerfect: perfect, hasWrong: !perfect,\n      scoreNum, scorePct, scoreBarColor,\n      scoreTag, scoreTagIcon, scoreTagBg, scoreTagFg,\n      wrongCount: '7', reviews: this.REVIEWS,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
